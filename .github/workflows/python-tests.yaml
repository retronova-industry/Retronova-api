name: Python API Tests

on: 
  push:

jobs:
  python-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Set environment variables for tests
        run: |
          echo "DATABASE_URL=sqlite:///:memory:" >> $GITHUB_ENV
          echo "SECRET_KEY=test-secret" >> $GITHUB_ENV
          echo "ARCADE_API_KEY=arcade-super-secret-api-key-change-this-in-production" >> $GITHUB_ENV
          echo "FIREBASE_USER_CREDENTIALS_PATH=./README.md" >> $GITHUB_ENV
          echo "FIREBASE_ADMIN_CREDENTIALS_PATH=./README.md" >> $GITHUB_ENV
          echo "CI=true" >> $GITHUB_ENV
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          pytest tests -v
      
      - name: Upload pytest report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report
          path: report.xml
